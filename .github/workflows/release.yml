name: Release

# Pushing a version tag (v0.5.3, …) publishes that version to npm.
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN secret to leak or rotate.
# One-time setup on npmjs.com → shipway → Settings → Trusted Publisher:
#   repository bernatch22/shipway · workflow release.yml · environment npm
# Until that's configured this job fails at the publish step; nothing else breaks.
#
# Provenance requires package.json's `repository` to match this repo — it does
# (bernatch22/shipway; the old pinecall/shipway name still redirects).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      # the tag must match package.json — a mismatch means a bad release
      - name: tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write        # OIDC, for Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
